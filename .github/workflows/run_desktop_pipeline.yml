            Add-Content $rp "[ROOT_CAUSE] downstream_blocked_by=StepB"
            Write-Error "StepB failed rc=$rc"
            exit $rc
          }
          $predExists = Test-Path $expectedPredWin
          $predExistsStatus = if ($predExists) { 'pass' } else { 'fail' }
          Write-Host "[STEPB_POST] required=stepB/$env:MODE/stepB_pred_time_all_${sym1}.csv exists=$predExistsStatus"
