                    Add-Content $rp '[STEP_STATUS] step=A status=skip'
                    Add-Content $rp '[STEP_STATUS] reason=reuse'
                    Add-Content $rp "[STEP_STATUS] stepa_reuse_source=$env:STEPA_REUSE_WIN_OUTPUT"

                    $nowIso = (Get-Date).ToUniversalTime().ToString('o')
                    $manifestObj = $null
                    if (Test-Path $manifestPath) {
                      try {
                        $manifestObj = Get-Content -Path $manifestPath -Raw | ConvertFrom-Json
                      } catch {
                        $manifestObj = $null
                      }
                    }
                    if ($null -eq $manifestObj) {
                      $manifestObj = [ordered]@{
                        schema_version = 2
                        created_at = $nowIso
                        updated_at = $nowIso
                        source_output_root = $env:STEPA_REUSE_WIN_OUTPUT
                        run_id = $env:APEX_RUN_ID
                        steps = [ordered]@{
                          A = [ordered]@{ status = 'reuse'; completed_at = $nowIso; elapsed_sec = 0.0; audit_status = 'PASS' }
                        }
                      }
                    } else {
                      if ($null -eq $manifestObj.steps) {
                        $manifestObj | Add-Member -NotePropertyName steps -NotePropertyValue ([ordered]@{}) -Force
                      }
                      $manifestObj.steps.A = [ordered]@{ status = 'reuse'; completed_at = $nowIso; elapsed_sec = 0.0; audit_status = 'PASS' }
                      $manifestObj.updated_at = $nowIso
                      $manifestObj.source_output_root = $env:STEPA_REUSE_WIN_OUTPUT
                      $manifestObj.run_id = $env:APEX_RUN_ID
                    }
                    $manifestObj | ConvertTo-Json -Depth 32 | Set-Content -Path $manifestPath -Encoding UTF8
                  }
                }

                Write-Host "[STEP_STATUS] step=A status=$stepAStatus reason=$stepAReason output_root=$outRoot"
                Add-Content $rp "[STEP_STATUS] step=A status=$stepAStatus reason=$stepAReason output_root=$outRoot"

                # Canonical reuse probe contract: always materialize split_summary.json at output_root root.
                try {
                  $stepASymbol = (('${{ inputs.symbols }}' -split ',')[0]).Trim().ToUpperInvariant()
                  if ([string]::IsNullOrWhiteSpace($stepASymbol)) { $stepASymbol = 'SOXL' }
                  $splitSummaryPath = Join-Path $outRoot 'split_summary.json'
                  if (-not (Test-Path $splitSummaryPath)) {
                    $splitPayload = [ordered]@{
                      symbol = $stepASymbol
                      mode = "$env:MODE".ToLowerInvariant()
                      test_start = "${{ inputs.test_start_date }}"
                      train_years = [int]"${{ inputs.train_years }}"
                      test_months = [int]"${{ inputs.test_months }}"
                    }
                    $null = New-Item -ItemType Directory -Path (Split-Path $splitSummaryPath -Parent) -Force
                    $splitPayload | ConvertTo-Json -Depth 8 | Set-Content -Path $splitSummaryPath -Encoding UTF8
                    Add-Content $rp "[REUSE] stepA_split_summary_materialized=$splitSummaryPath"
                  } else {
                    Add-Content $rp "[REUSE] stepA_split_summary_present=$splitSummaryPath"
                  }
                } catch {
                  Add-Content $rp "[WARN] stepA_split_summary_materialize_failed=$_"
                }

                $shouldExecuteStepA = ($stepAStatus -eq 'run')
                if (-not $shouldExecuteStepA) {
                  Write-Host "[StepA] status=$stepAStatus reason=$stepAReason (prior artifacts materialized into current output_root)"
                } else {
                  Write-Host "[WSL_PATHS] WSL_REPO_ROOT=$env:WSL_REPO_ROOT"
                  Write-Host "[WSL_PATHS] WSL_DATA_DIR=$env:WSL_DATA_DIR"
                  Write-Host "[WSL_PATHS] WSL_OUTPUT_DIR=$env:WSL_OUTPUT_DIR"
                  Write-Host "[WSL_PATHS] EFFECTIVE_WIN_OUTPUT=$outRoot"
                  Write-Host "[WSL_PATHS] EFFECTIVE_WSL_OUTPUT=$wslOut"

                  if (-not ($env:WSL_REPO_ROOT -match '^/mnt/')) {
                    throw "invalid_wsl_repo_root path='$env:WSL_REPO_ROOT'"
                  }
                  if (-not ($wslOut -match '^/mnt/')) {
                    throw "invalid_wsl_output path='$wslOut'"
                  }

                  $sym1 = ('${{ inputs.symbols }}' -split ',')[0].Trim()
                  $c = "cd '$env:WSL_REPO_ROOT' && '$env:WSL_PYTHON' tools/run_with_python.py tools/run_pipeline.py --symbol $sym1 --steps A --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }} --mode $env:MODE --output-root '$wslOut' --data-dir '$env:WSL_DATA_DIR' --auto-prepare-data 0 --enable-mamba --reuse-output $env:REUSE_OUTPUT --force-rebuild $env:FORCE_REBUILD --timing 1 --run-id '$env:APEX_RUN_ID' --branch-id '${{ github.ref_name }}' --execution-mode 'github_actions'"
                  Write-Host "[PIPELINE] command=wsl.exe -d $env:WSL_DISTRO -- bash -c $c"

                  try {
                    wsl.exe -d $env:WSL_DISTRO -- bash -c $c
                    $pipelineRc = $LASTEXITCODE
                  } catch {
                    $pipelineRc = if ($LASTEXITCODE -ne $null -and $LASTEXITCODE -ne 0) { $LASTEXITCODE } else { 1 }
                    Add-Content $rp "[NG] step_a pipeline_exception=$_"
                  } finally {
