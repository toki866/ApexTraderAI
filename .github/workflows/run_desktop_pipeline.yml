          $PSNativeCommandUseErrorActionPreference = $false
          $rc = 1
          $stepBException = ''
          $stepBLogPath = Join-Path $env:GITHUB_WORKSPACE 'temp\step_b_exec.log'
          $stepBLogPathWsl = ($stepBLogPath -replace '\\', '/')
