          $c = "cd '$env:WSL_REPO_ROOT' && '$env:WSL_PYTHON' tools/run_with_python.py tools/run_pipeline.py --symbol $sym1 --steps E --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }} --mode $env:MODE --output-root '$wslOut' --data-dir '$env:WSL_DATA_DIR' --auto-prepare-data 0 --enable-mamba --reuse-output $env:REUSE_OUTPUT --force-rebuild $env:FORCE_REBUILD --timing 1 --run-id '$env:APEX_RUN_ID' --branch-id '${{ github.ref_name }}' --execution-mode 'github_actions'"
          # [D] Log command before execution
          Write-Host "[PIPELINE] command=wsl.exe -d $env:WSL_DISTRO -- bash -c $c"
          Add-Content $rp "[STEP_E] command=$c"
          # [E] Execute with try/finally so rc is always logged
          $rc = 1
          $stepEException = ''
          try   { wsl.exe -d $env:WSL_DISTRO -- bash -c $c; $rc = $LASTEXITCODE }
          catch {
            $stepEException = "$_"
            Add-Content $rp "[NG] step_e exception=$stepEException"
          }
          finally {
            Write-Host "[StepE] rc=$rc"
            Add-Content $rp "[STEP_E] rc=$rc"
            $logDir = Join-Path (Split-Path -Parent $outRoot) 'logs'
            if (Test-Path $logDir) {
              $latestRunLog = Get-ChildItem -Path $logDir -Filter 'run_*.log' -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              if ($latestRunLog) {
                Add-Content $rp "[STEP_E] run_log_tail file=$($latestRunLog.FullName)"
                try {
                  Get-Content -Encoding UTF8 -Path $latestRunLog.FullName -Tail 120 -ErrorAction Stop | ForEach-Object { Add-Content $rp $_ }
                } catch {
                  Add-Content $rp "[STEP_E] run_log_tail_error=$_"
                }
              } else {
                Add-Content $rp "[STEP_E] run_log_tail file=<none>"
              }
            } else {
              Add-Content $rp "[STEP_E] run_log_dir_missing path=$logDir"
            }
          }
          if ($rc -ne 0) {
            Add-Content $rp "[NG] step_e rc=$rc"
            if ($stepEException) { Add-Content $rp "[NG] step_e exception_text=$stepEException" }
            Write-Error "StepE failed rc=$rc"
            exit $rc
          }
          Add-Content $rp '[OK] step_e'

      - name: StepF
        id: step_f
        if: ${{ always() && steps.prep_repo.outcome == 'success' && steps.prepare_env.outcome == 'success' && steps.step_b.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          REUSE_OUTPUT: ${{ inputs.reuse_output || '1' }}
          FORCE_REBUILD: ${{ inputs.force_rebuild || '0' }}
          WSL_DISTRO: Ubuntu
          WSL_PYTHON: /home/becky/miniforge3/envs/mamba_cuda/bin/python
        run: |
          $ErrorActionPreference = 'Stop'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $stepList = ('${{ steps.compute_steps.outputs.computed_steps }}' -split ',') | ForEach-Object { $_.Trim() }
          if ('F' -notin $stepList) { Write-Host "[STEP_STATUS] step=F status=skip reason=not_requested"; exit 0 }
          if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_WIN_OUTPUT)) { $env:EFFECTIVE_WIN_OUTPUT = $env:WIN_OUTPUT_DIR }
          if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_WSL_OUTPUT)) { $env:EFFECTIVE_WSL_OUTPUT = $env:WSL_OUTPUT_DIR }
          $outRoot = $env:EFFECTIVE_WIN_OUTPUT; $wslOut = $env:EFFECTIVE_WSL_OUTPUT
          $sym1 = ('${{ inputs.symbols }}' -split ',')[0].Trim()
          $status = 'run'
          $reuseDecision = @{ status='run'; reason='reuse_disabled_or_forced'; manifest_reuse=$false; artifact_reuse=$false; run_id='' }
          if ($env:REUSE_OUTPUT -eq '1' -and -not ($env:FORCE_REBUILD -eq '1')) {
            $cmdReuse = "cd '$env:WSL_REPO_ROOT' && '$env:WSL_PYTHON' tools/check_step_reuse.py --output-root '$wslOut' --step F --symbol '$sym1' --mode '$env:MODE' --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }} --enable-mamba 1 --enable-mamba-periodic 0"
            try {
              $reuseJson = wsl.exe -d $env:WSL_DISTRO -- bash -c $cmdReuse
              $reuseDecision = (($reuseJson | Select-Object -Last 1) | ConvertFrom-Json)
              $status = "$($reuseDecision.status)"
            } catch { Add-Content $rp "[STEP_STATUS] step=F reuse_probe_error=$_" }
          }
          Add-Content $rp "[STEP_STATUS] step=F manifest_reuse=$($reuseDecision.manifest_reuse) artifact_reuse=$($reuseDecision.artifact_reuse) reason=$($reuseDecision.reason) matched_run_id=$($reuseDecision.run_id) manifest_reason=$($reuseDecision.manifest_reason) manifest_path=$($reuseDecision.manifest_path) parse_error_type=$($reuseDecision.parse_error_type) fallback_to_artifact_check=$($reuseDecision.fallback_to_artifact_check) reuse_key=$($reuseDecision.reuse_key | ConvertTo-Json -Compress) reuse_match_found=$($reuseDecision.reuse_match_found) reuse_matched_output_root=$($reuseDecision.matched_output_root) reuse_selected_policy=$($reuseDecision.selected_policy)"
          Write-Host "[STEP_STATUS] step=F status=$status output_root=$outRoot"
          Add-Content $rp "[STEP_STATUS] step=F status=$status"
          $isReuse = ($status -eq 'skip') -or ("$($reuseDecision.final)" -eq 'reuse')
          if ($isReuse) { if ($reuseDecision.matched_output_root) { $m=$reuseDecision.matched_output_root; if ($m -match '^/mnt/([a-z])/(.*)$') { $drv=$Matches[1].ToUpperInvariant(); $rest=$Matches[2] -replace '/', '\\'; $mw="${drv}:\\$rest"; "EFFECTIVE_WSL_OUTPUT=$m" | Out-File $env:GITHUB_ENV -Append -Encoding utf8; "EFFECTIVE_WIN_OUTPUT=$mw" | Out-File $env:GITHUB_ENV -Append -Encoding utf8; Add-Content $rp "[REUSE] stepF_reuse_matched_output_root=$mw" } }; $status='skip'; Write-Host "[STEP_STATUS] step=F status=skip reason=reuse matched_output_root=$($reuseDecision.matched_output_root)"; Add-Content $rp "[STEP_STATUS] step=F status=skip reason=reuse matched_output_root=$($reuseDecision.matched_output_root)"; Write-Host "[StepF] status=skip reason=reuse"; exit 0 }
          # [B] Log WSL paths before execution
          Write-Host "[WSL_PATHS] WSL_REPO_ROOT=$env:WSL_REPO_ROOT"
          Write-Host "[WSL_PATHS] WSL_DATA_DIR=$env:WSL_DATA_DIR"
          Write-Host "[WSL_PATHS] WSL_OUTPUT_DIR=$env:WSL_OUTPUT_DIR"
          Write-Host "[WSL_PATHS] EFFECTIVE_WIN_OUTPUT=$outRoot"
          Write-Host "[WSL_PATHS] EFFECTIVE_WSL_OUTPUT=$wslOut"
          # [C] Validate WSL paths before bash -c
          if (-not ($env:WSL_REPO_ROOT -match '^/mnt/')) {
            Add-Content $rp "[NG] step_f invalid_wsl_repo_root='$env:WSL_REPO_ROOT'"
            Write-Error "WSL_REPO_ROOT not a /mnt/ path: '$env:WSL_REPO_ROOT'"; exit 1
          }
          if (-not ($wslOut -match '^/mnt/')) {
            Add-Content $rp "[NG] step_f invalid_wsl_output='$wslOut'"
            Write-Error "EFFECTIVE_WSL_OUTPUT not a /mnt/ path: '$wslOut'"; exit 1
          }
          $c = "cd '$env:WSL_REPO_ROOT' && '$env:WSL_PYTHON' tools/run_with_python.py tools/run_pipeline.py --symbol $sym1 --steps F --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }} --mode $env:MODE --output-root '$wslOut' --data-dir '$env:WSL_DATA_DIR' --auto-prepare-data 0 --enable-mamba --reuse-output $env:REUSE_OUTPUT --force-rebuild $env:FORCE_REBUILD --timing 1 --run-id '$env:APEX_RUN_ID' --branch-id '${{ github.ref_name }}' --execution-mode 'github_actions'"
          # [D] Log command before execution
          Write-Host "[PIPELINE] command=wsl.exe -d $env:WSL_DISTRO -- bash -c $c"
          # [E] Execute with try/finally so rc is always logged
          $rc = 1
          try   { wsl.exe -d $env:WSL_DISTRO -- bash -c $c; $rc = $LASTEXITCODE }
          catch { Add-Content $rp "[NG] step_f exception=$_" }
          finally { Write-Host "[StepF] rc=$rc" }
          if ($rc -ne 0) { Add-Content $rp "[NG] step_f rc=$rc"; Write-Error "StepF failed rc=$rc"; exit $rc }
          Add-Content $rp '[OK] step_f'

      - name: Write DONE.txt and finalize
        id: run_bat
        if: ${{ steps.prep_repo.outcome == 'success' && !failure() }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          COPY_TO_ONEDRIVE: ${{ inputs.copy_to_onedrive && '1' || '0' }}
          WSL_DISTRO: Ubuntu
        run: |
          $ErrorActionPreference = 'Continue'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          Add-Content $rp '[STEP] finalize'
          $outRoot = $env:EFFECTIVE_WIN_OUTPUT
          if (-not $outRoot) { $outRoot = $env:WIN_OUTPUT_DIR }
          if (-not (Test-Path $outRoot)) { New-Item -Path $outRoot -ItemType Directory -Force | Out-Null }
          # DONE.txt → correct artifact dir
          @("run_id=$env:APEX_RUN_ID",
            "finished_at=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz')",
            "commit=$env:GITHUB_SHA",
            "mode=$env:MODE") | Set-Content (Join-Path $outRoot 'DONE.txt') -Encoding UTF8
          Write-Host "[OK] DONE.txt written to $outRoot"
          Write-Host "[OK] run_id=$env:APEX_RUN_ID"
          Add-Content $rp ("[TIMING] events_path={0}" -f (Join-Path $outRoot (Join-Path "timing" (Join-Path $env:MODE "timing_events.jsonl"))))
          Add-Content $rp ("[TIMING] csv_path={0}" -f (Join-Path $outRoot "timings.csv"))
          Write-Host "[OK] output_root=$outRoot"
          # robocopy to OneDrive
          if ($env:COPY_TO_ONEDRIVE -eq '1') {
            $oneDest = $null
            if ($env:ONE_DRIVE_RUNS_ROOT) { $oneDest = Join-Path $env:ONE_DRIVE_RUNS_ROOT $env:APEX_RUN_ID }
            elseif ($env:OneDrive) { $oneDest = Join-Path $env:OneDrive "ApexTraderAI\runs\$env:APEX_RUN_ID" }
            if ($oneDest) {
              New-Item -Path (Join-Path $oneDest 'output') -ItemType Directory -Force | Out-Null
              robocopy $outRoot (Join-Path $oneDest 'output') /E /Z /R:2 /W:2
              $rrc = $LASTEXITCODE
              if ($rrc -ge 8) { Write-Warning "robocopy failed rc=$rrc" }
              else { Write-Host "[OK] robocopy to OneDrive rc=$rrc" }
            } else { Write-Warning "OneDrive path not found; skip copy" }
          }
          Add-Content $rp "[OK] finalize output_root=$outRoot"

      - name: Stage console log in workspace
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $workspaceTemp = Join-Path $env:GITHUB_WORKSPACE 'temp'
          $null = New-Item -Path $workspaceTemp -ItemType Directory -Force
          $consoleLog = Join-Path $env:RUNNER_TEMP 'run_all_local_then_copy_console.log'
          $workspaceConsoleLog = Join-Path $workspaceTemp 'run_all_local_then_copy_console.log'
          if (Test-Path $consoleLog) {
            Copy-Item -Path $consoleLog -Destination $workspaceConsoleLog -Force
            Write-Host "Staged console log: $workspaceConsoleLog"
          } else {
            Write-Warning "Console log not found at: $consoleLog"
            @(
              '[WARN] Console log was not generated by BAT execution.',
              '[WARN] Never finish a workflow run without leaving a readable log artifact.',
              ('[WARN] generated_at={0}' -f (Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz'))
            ) | Set-Content -Path $workspaceConsoleLog -Encoding UTF8
            Write-Host "Created fallback console log: $workspaceConsoleLog"
          }

      - name: Append error tails to ONE_TAP (always)
        if: always()
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Continue'

          $report = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          if (!(Test-Path $report)) {
            New-Item -Path (Split-Path $report -Parent) -ItemType Directory -Force | Out-Null
            '[WARN] ONE_TAP report missing; created.' | Set-Content -Path $report -Encoding UTF8
          }

          Add-Content $report ""
          Add-Content $report "[STEP] append_error_tails"
          Add-Content $report ("timestamp={0}" -f (Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz'))
          Add-Content $report ("[INFO] apex_run_id={0}" -f $env:APEX_RUN_ID)

          # python env snapshot (to compare with local)
          Add-Content $report "---- python_env ----"
          try { (& where.exe python 2>&1) | Add-Content $report } catch { ($_ | Out-String) | Add-Content $report }
          try { (& python --version 2>&1) | Add-Content $report } catch { ($_ | Out-String) | Add-Content $report }
          try { (& python -c "import sys; print(sys.executable)" 2>&1) | Add-Content $report } catch { ($_ | Out-String) | Add-Content $report }

          # console log tail
          $consoleLog = Join-Path $env:RUNNER_TEMP 'run_all_local_then_copy_console.log'
          Add-Content $report ("[INFO] console_log={0}" -f $consoleLog)
          if (Test-Path $consoleLog) {
            Add-Content $report "---- console_log_tail (last 350 lines) ----"
            (Get-Content -Encoding UTF8 $consoleLog -Tail 350 -ErrorAction SilentlyContinue) | Add-Content $report
          } else {
            Add-Content $report "[WARN] console log not found"
          }

          # run log tail (canonical: RUN_LOG_PATH / session_logs first; runs/*/logs last fallback)
          $workRoot = 'C:\work\apex_work\runs'
          $sessionLogRoot = 'C:\work\apex_work\session_logs'
          Add-Content $report ("[INFO] work_root={0}" -f $workRoot)
          Add-Content $report ("[INFO] session_log_root={0}" -f $sessionLogRoot)

          $runLogCandidates = @()
          if ($env:RUN_LOG_PATH) { $runLogCandidates += $env:RUN_LOG_PATH }
          if (Test-Path $sessionLogRoot) {
            $sessionLogs = Get-ChildItem -Path $sessionLogRoot -Filter 'run_*.log' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending
            $runLogCandidates += ($sessionLogs | ForEach-Object { $_.FullName })
          }

          $latestRunDir = $null
          if ($env:APEX_RUN_ID) {
            $candidateRunDir = Join-Path $workRoot $env:APEX_RUN_ID
            if (Test-Path $candidateRunDir) { $latestRunDir = Get-Item $candidateRunDir }
          }
          if (-not $latestRunDir -and (Test-Path $workRoot)) {
            $latestRunDir = Get-ChildItem -Path $workRoot -Directory -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }
          if ($latestRunDir) {
            Add-Content $report ("[INFO] latest_run_dir={0}" -f $latestRunDir.FullName)
            $latestRunLog = Get-ChildItem -Path (Join-Path $latestRunDir.FullName 'logs') -Filter 'run_*.log' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($latestRunLog) { $runLogCandidates += $latestRunLog.FullName }
          } else {
            Add-Content $report "[WARN] no run_dir found under work_root"
          }

          $selectedRunLog = $runLogCandidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -Unique |
            Select-Object -First 1

          if ($selectedRunLog) {
            Add-Content $report ("[INFO] run_log_selected={0}" -f $selectedRunLog)
            Add-Content $report "---- run_log_tail (last 350 lines) ----"
            (Get-Content -Encoding UTF8 $selectedRunLog -Tail 350 -ErrorAction SilentlyContinue) | Add-Content $report
          } else {
            Add-Content $report "[WARN] run_*.log not found in RUN_LOG_PATH/session_logs/runs fallback"
          }

          $global:LASTEXITCODE = 0
          exit 0

      - name: Package diagnostics to OneDrive (always)
        if: always()
        id: package_diag
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Stop'
          $diagScript = Join-Path $env:REPO_ROOT 'scripts\package_diagnostics_to_onedrive.ps1'
          $reportPath = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'

          Add-Content -Path $reportPath -Value @(
            '[STEP] package_diagnostics_to_onedrive',
            ('[INFO] diag_script={0}' -f $diagScript)
          )
          Write-Host "Diagnostics script path: $diagScript"

          $diagDirCandidates = @()
          if ($env:OneDrive) {
            $diagDirCandidates += (Join-Path $env:OneDrive 'ApexTraderAI\diagnostics')
          }
          if ($env:USERPROFILE) {
            $diagDirCandidates += (Join-Path $env:USERPROFILE 'OneDrive\ApexTraderAI\diagnostics')
          }
          $diagDirCandidates += (Join-Path $env:RUNNER_TEMP 'ApexTraderAI\diagnostics')

          $selectedDiagDir = $null
          foreach ($candidate in $diagDirCandidates) {
            try {
              $null = New-Item -Path $candidate -ItemType Directory -Force -ErrorAction Stop
              $selectedDiagDir = $candidate
              break
            } catch {
              Write-Warning "Diagnostics dir candidate unavailable: $candidate ($($_.Exception.Message))"
            }
          }

          if (-not $selectedDiagDir) {
            Add-Content -Path $reportPath -Value @(
              '[NG] package_diagnostics_to_onedrive',
              '[NG] selected diagnostics dir unavailable',
              ''
            )
            throw 'Unable to resolve diagnostics output directory from OneDrive/USERPROFILE/RUNNER_TEMP candidates.'
          }

          Write-Host "Selected diagnostics output dir: $selectedDiagDir"
          "diag_dir=$selectedDiagDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          $runDirForPackage = ''
          $outputRootForPackage = ''
          $runsRoot = 'C:\work\apex_work\runs'

          if ($env:EFFECTIVE_WIN_OUTPUT -and (Test-Path $env:EFFECTIVE_WIN_OUTPUT)) {
            $outputRootForPackage = $env:EFFECTIVE_WIN_OUTPUT
          } else {
            $primarySymbol = (('${{ inputs.symbols }}' -split ',')[0].Trim()).ToUpperInvariant()
            $testStartForPath = "${{ inputs.test_start_date }}"
            if ([string]::IsNullOrWhiteSpace($testStartForPath)) { $testStartForPath = 'unknown_test_start' }
            $canonicalOutput = Join-Path (Join-Path 'C:\work\apex_work\output' ($env:MODE.ToLowerInvariant())) $primarySymbol
            $canonicalOutput = Join-Path $canonicalOutput $testStartForPath
            if (Test-Path $canonicalOutput) {
              $outputRootForPackage = $canonicalOutput
            }
          }

          if (Test-Path $runsRoot) {
            $latestRun = $null
            if ($env:APEX_RUN_ID) {
              $candidate = Join-Path $runsRoot $env:APEX_RUN_ID
              if (Test-Path $candidate) { $latestRun = Get-Item $candidate }
            }
            if (-not $latestRun) {
              $latestRun = Get-ChildItem -Path $runsRoot -Directory -ErrorAction SilentlyContinue |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
            }
            if ($latestRun) {
              $runDirForPackage = $latestRun.FullName
              if (-not $outputRootForPackage) {
                $fallbackOutput = Join-Path $runDirForPackage 'output'
                if (Test-Path $fallbackOutput) { $outputRootForPackage = $fallbackOutput }
              }
            }
          }
          Add-Content -Path $reportPath -Value @(
            ('[PUBLISH] run_dir={0}' -f $runDirForPackage),
            ('[PUBLISH] output_root={0}' -f $outputRootForPackage)
          )

          if (Test-Path $diagScript) {
            powershell -NoProfile -ExecutionPolicy Bypass -File $diagScript -DiagDir "$selectedDiagDir" -RunDir "$runDirForPackage" -OutputRoot "$outputRootForPackage"
            if ($LASTEXITCODE -ne 0) {
              Add-Content -Path $reportPath -Value @(
                '[NG] package_diagnostics_to_onedrive',
                ('[NG] exit_code={0}' -f $LASTEXITCODE),
                ''
              )
              Write-Error "Diagnostics script exited with code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
            Add-Content -Path $reportPath -Value @(
              '[OK] package_diagnostics_to_onedrive',
              ('[OK] diag_dir={0}' -f $selectedDiagDir),
              ''
            )
          } else {
            Add-Content -Path $reportPath -Value @(
              '[NG] package_diagnostics_to_onedrive',
              '[NG] diagnostics script not found',
              ''
            )
            Write-Error "Diagnostics script not found: $diagScript"
            exit 1
          }

          if ((Get-Item $reportPath).Length -gt 60000) {
            $tail = Get-Content -Path $reportPath -Raw
            $tail = $tail.Substring([Math]::Max(0, $tail.Length - 60000))
            Set-Content -Path $reportPath -Value $tail -Encoding UTF8
          }

      - name: Verify diagnostics directory content
        if: always()
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
