              $logLines = Get-Content -Encoding UTF8 -Path $stepBLogPath -ErrorAction SilentlyContinue
              $tbStart = -1
              for ($i = 0; $i -lt $logLines.Count; $i++) {
                if ($logLines[$i] -match 'Traceback \(most recent call last\):') {
