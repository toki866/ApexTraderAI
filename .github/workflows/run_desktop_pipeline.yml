      - name: Compute steps for desktop BAT
        id: compute_steps
        if: ${{ steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Stop'
          $reportPath = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'

          $manualSteps = '${{ inputs.steps }}'.Trim()
          $resumeFrom = '${{ inputs.resume_from }}'.Trim()

          $runStepA = ('${{ inputs.run_stepA }}' -eq 'true')
          $runStepB = ('${{ inputs.run_stepB }}' -eq 'true')
          $runStepC = ('${{ inputs.run_stepC }}' -eq 'true')
          $runStepDPrime = ('${{ inputs.run_stepDPRIME }}' -eq 'true')
          $runStepE = ('${{ inputs.run_stepE }}' -eq 'true')
          $runStepF = ('${{ inputs.run_stepF }}' -eq 'true')
          $skipStepEInput = ('${{ inputs.skip_stepe }}' -eq 'true')
          $effectiveSkipStepE = $skipStepEInput -or (-not $runStepE)

          $allSteps = @('A', 'B', 'C', 'DPRIME', 'E', 'F')
          $computedSteps = @()
          $stepsSource = ''

          if ($manualSteps -ne '') {
            $stepsSource = 'manual'
            $computedSteps = $manualSteps.Split(',') | ForEach-Object { $_.Trim().ToUpperInvariant() } | Where-Object { $_ -ne '' }
          } elseif ($resumeFrom -ne '' -and $resumeFrom -ne 'none') {
            $stepsSource = 'resume_from'
            $resumeUpper = $resumeFrom.ToUpperInvariant()
            $startIndex = [Array]::IndexOf($allSteps, $resumeUpper)
            if ($startIndex -lt 0) {
              throw "Invalid resume_from value: $resumeFrom"
            }
            $computedSteps = $allSteps[$startIndex..($allSteps.Count - 1)]
          } else {
            $stepsSource = 'toggle'
            if ($runStepA) { $computedSteps += 'A' }
            if ($runStepB) { $computedSteps += 'B' }
            if ($runStepC) { $computedSteps += 'C' }
            if ($runStepDPrime) { $computedSteps += 'DPRIME' }
            if ($runStepE) { $computedSteps += 'E' }
            if ($runStepF) { $computedSteps += 'F' }
          }

          if ($effectiveSkipStepE) {
            $computedSteps = $computedSteps | Where-Object { $_ -ne 'E' }
          }

          $computedStepsString = ($computedSteps -join ',')
          $effectiveSkipStepEStr = if ($effectiveSkipStepE) { '1' } else { '0' }

          Write-Host "[INFO] computed_steps=$computedStepsString"
          Write-Host "[INFO] steps_source=$stepsSource"

          Add-Content -Path $reportPath -Value @(
            '[STEP] compute_steps',
            ('[INFO] computed_steps={0}' -f $computedStepsString),
            ('[INFO] steps_source={0}' -f $stepsSource),
            ('[INFO] effective_skip_stepe={0}' -f $effectiveSkipStepEStr),
            ''
          )

          "computed_steps=$computedStepsString" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "steps_source=$stepsSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "effective_skip_stepe=$effectiveSkipStepEStr" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Compute derived date window (data_start/data_end)
        if: ${{ steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Stop'
          $testStart = [datetime]::Parse("${{ inputs.test_start_date }}")
          $trainYears = [int]"${{ inputs.train_years }}"
          $testMonths = [int]"${{ inputs.test_months }}"

          $trainStart = $testStart.AddYears(-$trainYears)
          $dataStart = $trainStart.AddDays(-7)
          $testEnd = $testStart.AddMonths($testMonths)
          $dataEnd = $testEnd.AddDays(7)

          $dataStartStr = $dataStart.ToString('yyyy-MM-dd')
          $dataEndStr = $dataEnd.ToString('yyyy-MM-dd')
          $testStartStr = $testStart.ToString('yyyy-MM-dd')

          "DATA_START_DATE=$dataStartStr" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DATA_END_DATE=$dataEndStr" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DATA_START=$dataStartStr" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "DATA_END=$dataEndStr" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TEST_START=$testStartStr" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Computed DATA_START_DATE=$dataStartStr"
          Write-Host "Computed DATA_END_DATE=$dataEndStr"
          Write-Host "Using TEST_START=$testStartStr"

          $reportPath = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          if (Test-Path $reportPath) {
            Add-Content -Path $reportPath -Value @(
              '[STEP] compute_derived_date_window',
              ('[INFO] test_start_date={0}' -f $testStartStr),
              ('[INFO] data_start_date={0}' -f $dataStartStr),
              ('[INFO] data_end_date={0}' -f $dataEndStr),
              ''
            )
          }

      - name: Generate unique APEX_RUN_ID
        if: ${{ steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Stop'
          $ts = Get-Date -Format 'yyyyMMdd_HHmmss'
          $shortSha = '${{ github.sha }}'.Substring(0, 7)
          $apexRunId = "gh${{ github.run_id }}_att${{ github.run_attempt }}_${{ env.MODE }}_${ts}_${shortSha}"
          "APEX_RUN_ID=$apexRunId" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APEX_RUN_ID=$apexRunId"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- APEX_RUN_ID: $apexRunId"

      - name: Resolve output root by reuse signature
        id: resolve_output_root
        if: ${{ steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          WSL_DISTRO: Ubuntu
          WSL_PYTHON: /home/becky/miniforge3/envs/mamba_cuda/bin/python
          WORK_ROOT: C:\work\apex_work\runs
          SYMBOLS: ${{ inputs.symbols }}
          REUSE_OUTPUT: ${{ inputs.reuse_output || '1' }}
          FORCE_REBUILD: ${{ inputs.force_rebuild || '0' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $computedSteps = '${{ steps.compute_steps.outputs.computed_steps }}'
          $primarySymbol = (($env:SYMBOLS -split ',')[0]).Trim().ToUpperInvariant()
          $dataPrepareSymbols = ($env:SYMBOLS -split ',' | ForEach-Object { $_.Trim().ToUpperInvariant() } | Where-Object { $_ })
          $stepaExecutionSymbols = @($primarySymbol)
          $stepaReuseSymbols = @($primarySymbol)
          $featureSignature = "steps=$computedSteps|skip_stepe=${{ steps.compute_steps.outputs.effective_skip_stepe }}"
          $algorithmSignature = 'enable_mamba=1|enable_mamba_periodic=0|stepE=ppo,diffpg,marl_router'
          $parameterSignature = "train_years=${{ inputs.train_years }}|test_months=${{ inputs.test_months }}|mode=$env:MODE"
          $symbolsArg = $env:SYMBOLS

          function Convert-WindowsPathToWsl {
            param([Parameter(Mandatory = $true)][string]$WindowsPath)
            $trimmed = $WindowsPath.Trim()
            if ($trimmed -notmatch '^(?<drive>[A-Za-z]):\\(?<rest>.*)$') { throw "windows_path_invalid_format path='$trimmed'" }
            $drive = $Matches['drive'].ToLowerInvariant(); $rest = $Matches['rest'] -replace '\\', '/'
            if ($rest.Length -gt 0) { return "/mnt/$drive/$rest" }
            return "/mnt/$drive"
          }
          function Convert-WslPathToWindows {
            param([Parameter(Mandatory = $true)][string]$WslPath)
            $trimmed = $WslPath.Trim()
            if ($trimmed -notmatch '^/mnt/(?<drive>[a-z])/(?<rest>.*)$') { throw "wsl_path_invalid_format path='$trimmed'" }
            $drive = $Matches['drive'].ToUpperInvariant(); $rest = ($Matches['rest'] -replace '/', '\\')
            if ($rest.Length -gt 0) { return "${drive}:\\$rest" }
            return "${drive}:\\"
          }

          $wslRepoRoot = Convert-WindowsPathToWsl -WindowsPath $env:REPO_ROOT
          $wslWorkRoot = Convert-WindowsPathToWsl -WindowsPath $env:WORK_ROOT
          $wslReuse = ''; $reuseFound = $false
          $reuseRunId = ''
          $outputReuseScope = 'output_root_full'
          if ($computedSteps -eq 'A') {
            $outputReuseScope = 'stepa_only_skip_heavy_output_root_reuse'
          }
          if ($env:REUSE_OUTPUT -eq '1' -and $env:FORCE_REBUILD -ne '1' -and $computedSteps -ne 'A') {
            $findCmd = "cd '$wslRepoRoot' && '$env:WSL_PYTHON' tools/find_reuse_run.py --reuse-scope output_root --print-json --symbol '$symbolsArg' --mode $env:MODE --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }} --feature-signature '$featureSignature' --algorithm-signature '$algorithmSignature' --parameter-signature '$parameterSignature'"
            $stdoutTmp = Join-Path $env:RUNNER_TEMP ("reuse_output_root_stdout_" + [guid]::NewGuid().ToString('N') + ".txt")
            wsl.exe -d $env:WSL_DISTRO -- bash -c $findCmd 1> $stdoutTmp
            $stdoutRaw = if (Test-Path $stdoutTmp) { (Get-Content $stdoutTmp -Raw -Encoding UTF8) } else { '' }
            $jsonLine = (($stdoutRaw -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }) | Select-Object -First 1)
            if ($jsonLine) {
              try {
                $parsed = $jsonLine | ConvertFrom-Json
                $wslReuse = ("$($parsed.path)").Trim()
                $reuseRunId = ("$($parsed.run_id)").Trim()
              } catch {
                $wslReuse = $jsonLine
              }
            }
            if ($wslReuse) { $reuseFound = $true }
          }

          if ($reuseFound) {
            $winOutput = Convert-WslPathToWindows -WslPath $wslReuse
            $wslOutput = $wslReuse
            $created = $false
            $source = 'reused_existing'
          } else {
            $testStartForPath = "${{ inputs.test_start_date }}"
            if ([string]::IsNullOrWhiteSpace($testStartForPath)) { $testStartForPath = 'unknown_test_start' }
            $winOutput = Join-Path (Join-Path 'C:\work\apex_work\output' ($env:MODE.ToLowerInvariant())) $primarySymbol
            $winOutput = Join-Path $winOutput $testStartForPath
            $wslOutput = Convert-WindowsPathToWsl -WindowsPath $winOutput
            if ($computedSteps -eq 'A') {
              $created = $false
              $source = 'fresh_pending_stepa_simple_canonical'
            } else {
              New-Item -Path $winOutput -ItemType Directory -Force | Out-Null
              $created = $true
              $source = 'fresh_created_canonical'
            }
          }

          $reusePayload = [ordered]@{
            mode = "$env:MODE"
            symbols = @($symbolsArg -split ',' | ForEach-Object { $_.Trim().ToUpperInvariant() } | Where-Object { $_ })
            test_start_date = "${{ inputs.test_start_date }}"
            train_years = [int]"${{ inputs.train_years }}"
            test_months = [int]"${{ inputs.test_months }}"
            feature_signature = $featureSignature
            algorithm_signature = $algorithmSignature
            parameter_signature = $parameterSignature
          }
          $hashJson = $reusePayload | ConvertTo-Json -Depth 5 -Compress
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($hashJson)
          $sha = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
          $reuseHash = -join ($sha | ForEach-Object { $_.ToString('x2') })
          $reuseHash = $reuseHash.Substring(0,16)
          $reusePayload['reuse_key_hash'] = $reuseHash

          "EFFECTIVE_WIN_OUTPUT=$winOutput" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "EFFECTIVE_WSL_OUTPUT=$wslOutput" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "REUSE_MATCH_FOUND=$($reuseFound.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          Add-Content $rp "[REUSE] reuse_scope=$outputReuseScope"
          Add-Content $rp "[REUSE] reuse_key_hash=$reuseHash"
          Add-Content $rp "[REUSE] reuse_key_test_start_date=${{ inputs.test_start_date }}"
          Add-Content $rp "[REUSE] reuse_key_train_years=${{ inputs.train_years }}"
          Add-Content $rp "[REUSE] reuse_key_test_months=${{ inputs.test_months }}"
          Add-Content $rp "[REUSE] reuse_key_feature_signature=$featureSignature"
          Add-Content $rp "[REUSE] reuse_key_algorithm_signature=$algorithmSignature"
          Add-Content $rp "[REUSE] reuse_key_parameter_signature=$parameterSignature"
          Add-Content $rp "[REUSE] reuse_match_found=$($reuseFound.ToString().ToLowerInvariant())"
          Add-Content $rp "[REUSE] matched_output_root=$winOutput"
          Add-Content $rp "[REUSE] matched_run_id="
          Add-Content $rp "[REUSE] output_root_source=$source"
          Add-Content $rp "[REUSE] created_new_output_root=$($created.ToString().ToLowerInvariant())"
          Add-Content $rp "[REUSE] final_EFFECTIVE_WIN_OUTPUT=$winOutput"
          Add-Content $rp "[REUSE] final_EFFECTIVE_WSL_OUTPUT=$wslOutput"
          Add-Content $rp "[REUSE] manifest_owner=run_pipeline_only"

          if ($created) {
            $reuseSigPath = Join-Path $winOutput 'reuse_signature.json'
            $reusePayload | ConvertTo-Json -Depth 5 | Set-Content -Path $reuseSigPath -Encoding UTF8
          }

      - name: Cleanup old WORK_ROOT runs (keep latest)
        if: ${{ steps.prep_repo.outcome == 'success' }}
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Continue'
          $runsRoot = 'C:\work\apex_work\runs'
          $keepLatest = 30
          $minAgeHours = 6
          $cutoff = (Get-Date).AddHours(-$minAgeHours)
          $deletedCount = 0

          if (Test-Path $runsRoot) {
            $runDirs = Get-ChildItem -Path $runsRoot -Directory -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending
            $removeTargets = $runDirs | Select-Object -Skip $keepLatest | Where-Object { $_.LastWriteTime -lt $cutoff }
            foreach ($target in $removeTargets) {
              try {
                Remove-Item -Path $target.FullName -Recurse -Force -ErrorAction SilentlyContinue
                if (-not (Test-Path $target.FullName)) { $deletedCount++ }
              } catch {
                Write-Warning "Failed to remove old run dir: $($target.FullName)"
              }
            }
            Write-Host "Cleanup summary: root=$runsRoot keepLatest=$keepLatest minAgeHours=$minAgeHours deleted=$deletedCount total=$($runDirs.Count)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- WORK_ROOT cleanup (mode=${{ env.MODE }}): deleted=$deletedCount keepLatest=$keepLatest minAgeHours=$minAgeHours total=$($runDirs.Count)"
          } else {
            Write-Warning "WORK_ROOT does not exist: $runsRoot"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- WORK_ROOT cleanup (mode=${{ env.MODE }}): skipped (root not found)"
          }

      - name: Prepare environment
        id: prepare_env
        if: ${{ steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          WSL_DISTRO: Ubuntu
          WSL_PYTHON: /home/becky/miniforge3/envs/mamba_cuda/bin/python
          WORK_ROOT: C:\work\apex_work\runs
          SYMBOLS: ${{ inputs.symbols }}
        run: |
          $ErrorActionPreference = 'Continue'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $null = New-Item -Path (Split-Path $rp) -ItemType Directory -Force

          # [A][E] 入力変数を即座に全部 ONE_TAP / Write-Host に出力
          foreach ($line in @(
            '[STEP] prepare_environment',
            '[PREPARE_ENV] begin',
            "[PREPARE_ENV] REPO_ROOT=$env:REPO_ROOT",
            "[PREPARE_ENV] APEX_RUN_ID=$env:APEX_RUN_ID",
            "[PREPARE_ENV] WSL_DISTRO=$env:WSL_DISTRO",
            "[PREPARE_ENV] WSL_PYTHON=$env:WSL_PYTHON",
            "[PREPARE_ENV] WORK_ROOT=$env:WORK_ROOT",
            "[PREPARE_ENV] SYMBOLS=$env:SYMBOLS"
          )) { Add-Content $rp $line; Write-Host $line }

          # Windows パス計算（output root は reuse 判定済みの EFFECTIVE_WIN_OUTPUT を優先使用）
          $winRunDir    = Join-Path $env:WORK_ROOT $env:APEX_RUN_ID
          $winDataDir   = Join-Path $winRunDir 'data'
          $sessionLogRoot = 'C:\work\apex_work\session_logs'
          $winLogDir    = Join-Path $sessionLogRoot ("{0}_att{1}" -f $env:GITHUB_RUN_ID, $env:GITHUB_RUN_ATTEMPT)
          $winOutputDir = if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_WIN_OUTPUT)) { Join-Path $winRunDir 'output' } else { $env:EFFECTIVE_WIN_OUTPUT }
          $pathMsg = "[PREPARE_ENV] winRunDir=$winRunDir winDataDir=$winDataDir winOutputDir=$winOutputDir winLogDir=$winLogDir"
          Add-Content $rp $pathMsg; Write-Host $pathMsg

          # [D][E] ディレクトリ作成（軽量領域のみ）
          Add-Content $rp '[PREPARE_ENV] create_dirs begin'; Write-Host '[PREPARE_ENV] create_dirs begin'
          try {
            foreach ($d in @($winDataDir, $winLogDir)) {
              $null = [System.IO.Directory]::CreateDirectory($d)
            }
            Add-Content $rp '[PREPARE_ENV] create_dirs ok'; Write-Host '[PREPARE_ENV] create_dirs ok'
          } catch {
            $msg = "[NG] prepare_environment create_dirs error=$_"
            Add-Content $rp $msg; Write-Error $msg; exit 1
          }

          # [D] console log / run log を早期初期化（失敗してもファイルが残るように）
          $consoleLog = Join-Path $env:RUNNER_TEMP 'run_all_local_then_copy_console.log'
          $runLog     = Join-Path $winLogDir ("run_{0}.log" -f $env:APEX_RUN_ID)
          try {
            $null = New-Item -ItemType File -Path $consoleLog -Force
            $null = New-Item -ItemType File -Path $runLog     -Force
            "RUN_CONSOLE_LOG=$consoleLog" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            "RUN_LOG_PATH=$runLog"        | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            $logMsg = "[PREPARE_ENV] console_log=$consoleLog run_log=$runLog"
            Add-Content $rp $logMsg; Write-Host $logMsg
          } catch {
            $warnMsg = "[WARN] prepare_environment log_init failed error=$_"
            Add-Content $rp $warnMsg; Write-Warning $warnMsg
          }

          "WIN_RUN_DIR=$winRunDir"       | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WIN_DATA_DIR=$winDataDir"     | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WIN_OUTPUT_DIR=$winOutputDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WIN_LOG_DIR=$winLogDir"       | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "EFFECTIVE_WIN_OUTPUT=$winOutputDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

          # [B][E] Windows->WSL 変換（PowerShell完結）— 値・rc を各変換ごとに記録
          function Convert-WindowsPathToWsl {
            param([Parameter(Mandatory = $true)][string]$WindowsPath)
            if ([string]::IsNullOrWhiteSpace($WindowsPath)) {
              throw "windows_path_empty"
            }
            $trimmed = $WindowsPath.Trim()
            if ($trimmed -notmatch '^(?<drive>[A-Za-z]):\\(?<rest>.*)$') {
              throw "windows_path_invalid_format path='$trimmed'"
            }
            $drive = $Matches['drive'].ToLowerInvariant()
            $rest = $Matches['rest'] -replace '\\', '/'
            if ($rest.Length -gt 0) {
              return "/mnt/$drive/$rest"
            }
            return "/mnt/$drive"
          }

          $wslRepoRoot  = ''; $wslDataDir = ''; $wslOutputDir = ''
          foreach ($conv in @(
            @{ name='WSL_REPO_ROOT';  win=$env:REPO_ROOT },
            @{ name='WSL_DATA_DIR';   win=$winDataDir },
            @{ name='WSL_OUTPUT_DIR'; win=$winOutputDir }
          )) {
            $cName = $conv.name; $cWin = $conv.win
            $beginMsg = "[PREPARE_ENV] path_convert_begin var=$cName win='$cWin'"
            Add-Content $rp $beginMsg; Write-Host $beginMsg
            $wslVal = ''
            $convRc = -1
            try {
              $wslVal = Convert-WindowsPathToWsl -WindowsPath $cWin
              $convRc = 0
            } catch {
              $convRc = 1
              $excMsg = "[NG] prepare_environment convert_windows_to_wsl_$cName exception=$_"
              Add-Content $rp $excMsg; Write-Warning $excMsg
            }
            $rcMsg = "[PREPARE_ENV] path_convert_result var=$cName rc=$convRc result='$wslVal'"
            Add-Content $rp $rcMsg; Write-Host $rcMsg
            if (-not ($wslVal -match '^/mnt/[a-z]/')) {
              $ngMsg = "[NG] prepare_environment wslpath_invalid var=$cName win='$cWin' wsl='$wslVal' rc=$convRc distro='$env:WSL_DISTRO'"
              Add-Content $rp $ngMsg; Write-Error $ngMsg; exit 1
            }
            if ($cName -eq 'WSL_REPO_ROOT')  { $wslRepoRoot  = $wslVal }
            if ($cName -eq 'WSL_DATA_DIR')   { $wslDataDir   = $wslVal }
            if ($cName -eq 'WSL_OUTPUT_DIR') { $wslOutputDir = $wslVal }
          }
          "WSL_REPO_ROOT=$wslRepoRoot"   | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WSL_DATA_DIR=$wslDataDir"     | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "WSL_OUTPUT_DIR=$wslOutputDir" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          $wslSummary = "[PREPARE_ENV] wsl_paths wsl_repo_root=$wslRepoRoot wsl_data_dir=$wslDataDir wsl_output_dir=$wslOutputDir"
          Add-Content $rp $wslSummary; Write-Host $wslSummary

          # [E] pip install — 各フェーズの rc を個別に記録
          Add-Content $rp '[PREPARE_ENV] pip_install begin'; Write-Host '[PREPARE_ENV] pip_install begin'
          & where.exe python 2>&1 | Tee-Object -FilePath $consoleLog -Append | Write-Host
          python --version        2>&1 | Tee-Object -FilePath $consoleLog -Append | Write-Host
          python -m pip install -U pip setuptools wheel 2>&1 | Tee-Object -FilePath $consoleLog -Append | Write-Host
          $pipBaseRc = $LASTEXITCODE
          Add-Content $rp "[PREPARE_ENV] pip_base rc=$pipBaseRc"; Write-Host "[PREPARE_ENV] pip_base rc=$pipBaseRc"
          if ($pipBaseRc -ne 0) {
            $ngMsg = "[NG] prepare_environment pip_base rc=$pipBaseRc"
            Add-Content $rp $ngMsg; Write-Error $ngMsg; exit $pipBaseRc
          }
          python -m pip install -r (Join-Path $env:REPO_ROOT 'requirements.txt') 2>&1 | Tee-Object -FilePath $consoleLog -Append | Write-Host
          $pipReqRc = $LASTEXITCODE
          Add-Content $rp "[PREPARE_ENV] pip_req rc=$pipReqRc"; Write-Host "[PREPARE_ENV] pip_req rc=$pipReqRc"
          if ($pipReqRc -ne 0) {
            $ngMsg = "[NG] prepare_environment pip_req rc=$pipReqRc"
            Add-Content $rp $ngMsg; Write-Error $ngMsg; exit $pipReqRc
          }

          # [C][E] prepare_data — try/finally で rc を必ず記録
          $prepCmd = "cd '$wslRepoRoot' && '$env:WSL_PYTHON' tools/run_with_python.py tools/prepare_data.py --symbols $env:SYMBOLS --start $env:DATA_START --end $env:DATA_END --force --data-dir '$wslDataDir'"
          $prepBegin = "[PREPARE_ENV] prepare_data begin prepCmd=$prepCmd"
          Add-Content $rp $prepBegin; Add-Content $consoleLog $prepBegin; Write-Host $prepBegin
          $prepDataRc = -1
          try {
            wsl.exe -d $env:WSL_DISTRO -- bash -c $prepCmd 2>&1 | Tee-Object -FilePath $consoleLog -Append | Tee-Object -FilePath $runLog -Append | Write-Host
            $prepDataRc = $LASTEXITCODE
          } catch {
            $excMsg = "[NG] prepare_environment prepare_data exception=$_"
            Add-Content $rp $excMsg; Write-Warning $excMsg
          } finally {
            $doneMsg = "[PREPARE_ENV] prepare_data rc=$prepDataRc"
            Add-Content $rp $doneMsg; Write-Host $doneMsg
          }
          if ($prepDataRc -ne 0) {
            $ngMsg = "[NG] prepare_environment prepare_data failed rc=$prepDataRc prepCmd=$prepCmd"
            Add-Content $rp $ngMsg; Write-Error $ngMsg; exit $prepDataRc
          }

          Add-Content $rp '[PREPARE_ENV] success'
          Add-Content $rp '[OK] prepare_environment'
          Write-Host '[PREPARE_ENV] success'


      - name: Record prepare_environment failure root cause and downstream skip reasons
        if: ${{ always() && steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $ErrorActionPreference = 'Continue'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $prepareOutcome = '${{ steps.prepare_env.outcome }}'
          Add-Content $rp "[PREPARE_ENV][FINAL] WIN_RUN_DIR=$env:WIN_RUN_DIR"
          Add-Content $rp "[PREPARE_ENV][FINAL] WIN_DATA_DIR=$env:WIN_DATA_DIR"
          Add-Content $rp "[PREPARE_ENV][FINAL] WIN_OUTPUT_DIR=$env:WIN_OUTPUT_DIR"
          Add-Content $rp "[PREPARE_ENV][FINAL] WSL_REPO_ROOT=$env:WSL_REPO_ROOT"
          Add-Content $rp "[PREPARE_ENV][FINAL] WSL_DATA_DIR=$env:WSL_DATA_DIR"
          Add-Content $rp "[PREPARE_ENV][FINAL] WSL_OUTPUT_DIR=$env:WSL_OUTPUT_DIR"
          Add-Content $rp "[PREPARE_ENV][FINAL] prepare_environment_outcome=$prepareOutcome"
          if ($prepareOutcome -eq 'failure') {
            Add-Content $rp '[ROOT_CAUSE] root_failure_step=prepare_environment'
            Add-Content $rp '[ROOT_CAUSE] downstream_blocked_by=prepare_environment'
            Add-Content $rp '[NG] prepare_environment_outcome=failure'
            foreach ($stepName in @('B','C','DPRIME','E','F')) {
              $line = "[STEP_STATUS] step=$stepName status=skip reason=prepare_environment_failure"
              Add-Content $rp $line
              Write-Host $line
            }
          }

      - name: Resolve StepA simple reuse source
        id: resolve_reuse_stepa
        if: ${{ always() && steps.prep_repo.outcome == 'success' }}
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          WSL_DISTRO: Ubuntu
          WSL_PYTHON: /home/becky/miniforge3/envs/mamba_cuda/bin/python
          WORK_ROOT: C:\work\apex_work\runs
          SYMBOLS: ${{ inputs.symbols }}
          REUSE_OUTPUT: ${{ inputs.reuse_output || '1' }}
          FORCE_REBUILD: ${{ inputs.force_rebuild || '0' }}
        run: |
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          Add-Content $rp '[STEP] resolve_reuse_stepa'
          $computedSteps = '${{ steps.compute_steps.outputs.computed_steps }}'
          $primarySymbol = (($env:SYMBOLS -split ',')[0]).Trim().ToUpperInvariant()
          $dataPrepareSymbols = ($env:SYMBOLS -split ',' | ForEach-Object { $_.Trim().ToUpperInvariant() } | Where-Object { $_ })
          $stepaExecutionSymbols = @($primarySymbol)
          $stepaReuseSymbols = @($primarySymbol)
          $wslRepoRoot = '/mnt/' + $env:REPO_ROOT.Substring(0,1).ToLowerInvariant() + '/' + ($env:REPO_ROOT.Substring(3) -replace '\\','/')
          $wslWorkRoot = '/mnt/' + $env:WORK_ROOT.Substring(0,1).ToLowerInvariant() + '/' + ($env:WORK_ROOT.Substring(3) -replace '\\','/')
          $reuseFound = $false
          $reuseWsl = ''
          $reuseRunId = ''
          $stepaReuseReason = 'missing_required_outputs'
          $stepaCanonicalRoot = ''
          $stepaEvalPath = ''
          $stepaReusePath = ''
          $stepaDiagChecks = @()
          if ($env:REUSE_OUTPUT -eq '1' -and $env:FORCE_REBUILD -ne '1') {
            $diagCmd = "cd '$wslRepoRoot' && '$env:WSL_PYTHON' tools/find_reuse_run.py --reuse-scope stepA_simple --diagnose-stepa-simple --symbol '$primarySymbol' --mode $env:MODE --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }}"
            $diagTmp = Join-Path $env:RUNNER_TEMP ("reuse_stepa_simple_diag_" + [guid]::NewGuid().ToString('N') + ".txt")
            wsl.exe -d $env:WSL_DISTRO -- bash -c $diagCmd 1> $diagTmp
            $diagRaw = if (Test-Path $diagTmp) { (Get-Content $diagTmp -Raw -Encoding UTF8) } else { '' }
            $diagLine = (($diagRaw -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }) | Select-Object -First 1)
            if ($diagLine) {
              try {
                $diag = $diagLine | ConvertFrom-Json
                $stepaReuseReason = ("$($diag.reason)").Trim()
                $stepaCanonicalRoot = ("$($diag.canonical_output_root)").Trim()
                $stepaEvalPath = ("$($diag.evaluation_stepa_path)").Trim()
                $stepaReusePath = ("$($diag.stepa_reuse_path)").Trim()
                $stepaDiagChecks = @($diag.checks)
              } catch {
                Add-Content $rp "[REUSE] stepa_simple_diag_parse_error=$_"
              }
            }

            $findCmd = "cd '$wslRepoRoot' && '$env:WSL_PYTHON' tools/find_reuse_run.py --reuse-scope stepA_simple --print-json --symbol '$primarySymbol' --mode $env:MODE --test-start '${{ inputs.test_start_date }}' --train-years ${{ inputs.train_years }} --test-months ${{ inputs.test_months }}"
            $stdoutTmp = Join-Path $env:RUNNER_TEMP ("reuse_stepa_simple_stdout_" + [guid]::NewGuid().ToString('N') + ".txt")
            wsl.exe -d $env:WSL_DISTRO -- bash -c $findCmd 1> $stdoutTmp
            $stdoutRaw = if (Test-Path $stdoutTmp) { (Get-Content $stdoutTmp -Raw -Encoding UTF8) } else { '' }
            $jsonLine = (($stdoutRaw -split "`r?`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }) | Select-Object -First 1)
            if ($jsonLine) {
              try {
                $parsed = $jsonLine | ConvertFrom-Json
                $reuseWsl = ("$($parsed.path)").Trim()
                $reuseRunId = ("$($parsed.run_id)").Trim()
              } catch {
                $reuseWsl = $jsonLine
              }
            }
            if ($reuseWsl) { $reuseFound = $true }
          }
          $reuseWin = ''
          if ($reuseFound -and $reuseWsl -match '^/mnt/([a-z])/(.*)$') {
            $drive = $Matches[1].ToUpperInvariant(); $rest = $Matches[2] -replace '/', '\\'
            $reuseWin = "${drive}:\\$rest"
          }
          "STEPA_REUSE_MATCH_FOUND=$($reuseFound.ToString().ToLowerInvariant())" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "STEPA_REUSE_WSL_OUTPUT=$reuseWsl" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "STEPA_REUSE_WIN_OUTPUT=$reuseWin" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          Add-Content $rp "[REUSE] primary_symbol=$primarySymbol"
          Add-Content $rp "[REUSE] data_prepare_symbols=$($dataPrepareSymbols -join ',')"
          Add-Content $rp "[REUSE] stepa_execution_symbols=$($stepaExecutionSymbols -join ',')"
          Add-Content $rp "[REUSE] stepa_reuse_symbols=$($stepaReuseSymbols -join ',')"
          Add-Content $rp '[REUSE] stepa_reuse_scope=stepA_simple'
          Add-Content $rp "[REUSE] stepa_reuse_key=mode=$env:MODE|symbols=$($stepaReuseSymbols -join ',')|test_start=${{ inputs.test_start_date }}|train_years=${{ inputs.train_years }}|test_months=${{ inputs.test_months }}"
          Add-Content $rp "[REUSE] stepa_reuse_match_found=$($reuseFound.ToString().ToLowerInvariant())"
          Add-Content $rp "[REUSE] STEPA_REUSE_MATCH_FOUND=$($reuseFound.ToString().ToLowerInvariant())"
          Add-Content $rp "[REUSE] stepa_reuse_matched_output_root=$reuseWin"
          Add-Content $rp "[REUSE] stepa_reuse_matched_run_id="
          Add-Content $rp '[REUSE] stepa_reuse_selected_policy=canonical_output_root'
          Add-Content $rp "[REUSE] stepa_reuse_reason=$stepaReuseReason"
          Add-Content $rp "[REUSE] stepa_reuse_canonical_output_root=$stepaCanonicalRoot"
          Add-Content $rp "[REUSE] stepa_reuse_eval_stepa_path=$stepaEvalPath"
          Add-Content $rp "[REUSE] stepa_reuse_stepa_path=$stepaReusePath"
          foreach ($ck in $stepaDiagChecks) {
            $ckPath = ("$($ck.path)").Trim()
            $ckStatus = ("$($ck.status)").Trim()
            $ckRequired = ("$($ck.required)").Trim()
            if ($ckPath) {
              Add-Content $rp "[REUSE][STEPA_REQUIRED] path=$ckPath required=$ckRequired status=$ckStatus"
            }
          }
          if ($computedSteps -eq 'A' -and $reuseFound -and $reuseWin) {
            "EFFECTIVE_WIN_OUTPUT=$reuseWin" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            "EFFECTIVE_WSL_OUTPUT=$reuseWsl" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            Add-Content $rp '[REUSE] output_root_source=stepa_simple_reused_existing'
          }
          exit 0

      - name: Resolve strict reuse source
        id: resolve_reuse_pipeline
        if: ${{ always() && steps.prep_repo.outcome == 'success' }}
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        run: |
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $finalWinOutput = $env:EFFECTIVE_WIN_OUTPUT
          $finalWslOutput = $env:EFFECTIVE_WSL_OUTPUT
          "reuse_found=$($env:REUSE_MATCH_FOUND)" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          Add-Content $rp '[STEP] resolve_reuse_pipeline'
          Add-Content $rp '[REUSE] strict_reuse_decision=delegated_to_output_root_reuse'
          Add-Content $rp ("[REUSE] final_EFFECTIVE_WIN_OUTPUT='$finalWinOutput'")
          Add-Content $rp ("[REUSE] final_EFFECTIVE_WSL_OUTPUT='$finalWslOutput'")
          exit 0

      - name: StepA
        id: step_a
        if: ${{ always() && steps.prep_repo.outcome == 'success' }}
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "{0}"
        env:
          REUSE_OUTPUT: ${{ inputs.reuse_output || '1' }}
          FORCE_REBUILD: ${{ inputs.force_rebuild || '0' }}
          WSL_DISTRO: Ubuntu
          WSL_PYTHON: /home/becky/miniforge3/envs/mamba_cuda/bin/python
        run: |
          $ErrorActionPreference = 'Stop'
          $rp = Join-Path $env:GITHUB_WORKSPACE 'temp\ONE_TAP_ERROR_REPORT.txt'
          $stepRc = 0
          $stepAStatus = 'unknown'
          $stepAReason = ''
          $pipelineRc = -1
          $requestedStepsRaw = '${{ steps.compute_steps.outputs.computed_steps }}'
          $prepareOutcome = '${{ steps.prepare_env.outcome }}'
          $resolveReuseOutcome = '${{ steps.resolve_reuse_pipeline.outcome }}'
          $stepaResolveOutcome = '${{ steps.resolve_reuse_stepa.outcome }}'
          if ($stepaResolveOutcome -eq 'success') {
            $resolveReuseOutcome = 'success_via_stepa_simple'
          } elseif ($resolveReuseOutcome -ne 'success') {
            $resolveReuseOutcome = 'error_fallback'
          }
          $validateContextOutcome = 'not_defined'
          $outRoot = ''
          $wslOut = ''
          $manifestPath = ''
          try {
            Add-Content $rp '[STEP] step_a_entry'
            if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_WIN_OUTPUT)) { $env:EFFECTIVE_WIN_OUTPUT = $env:WIN_OUTPUT_DIR }
            if ([string]::IsNullOrWhiteSpace($env:EFFECTIVE_WSL_OUTPUT)) { $env:EFFECTIVE_WSL_OUTPUT = $env:WSL_OUTPUT_DIR }

            $outRoot = $env:EFFECTIVE_WIN_OUTPUT
            $wslOut = $env:EFFECTIVE_WSL_OUTPUT
            Add-Content $rp "[STEP_STATUS] requested_steps=$requestedStepsRaw"
            Add-Content $rp "[STEP_STATUS] prepare_environment_outcome=$prepareOutcome"
            Add-Content $rp "[STEP_STATUS] resolve_reuse_outcome=$resolveReuseOutcome"
            Add-Content $rp "[STEP_STATUS] validate_context_outcome=$validateContextOutcome"
            Add-Content $rp "[STEP_STATUS] WIN_OUTPUT_DIR=$env:WIN_OUTPUT_DIR"
            Add-Content $rp "[STEP_STATUS] WSL_OUTPUT_DIR=$env:WSL_OUTPUT_DIR"
            Add-Content $rp "[STEP_STATUS] outRoot=$outRoot"
            Add-Content $rp "[STEP_STATUS] wslOut=$wslOut"

            if ($prepareOutcome -ne 'success') {
              $stepAStatus = 'skip'
              $stepAReason = "prepare_environment_$prepareOutcome"
            } else {
              $stepList = ($requestedStepsRaw -split ',') | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
              if ('A' -notin $stepList) {
                $stepAStatus = 'skip'
                $stepAReason = 'not_requested'
              } else {
                if ([string]::IsNullOrWhiteSpace($outRoot) -or [string]::IsNullOrWhiteSpace($wslOut)) {
                  throw "invalid_effective_output_paths outRoot='$outRoot' wslOut='$wslOut'"
                }
                $manifestPath = Join-Path $outRoot 'run_manifest.json'
                $stepAStatus = 'run'
                $stepAReason = 'execute'
                $primarySymbol = (('${{ inputs.symbols }}' -split ',')[0].Trim()).ToUpperInvariant()
                $stepASubdir = Join-Path 'stepA' $env:MODE
                if ($env:REUSE_OUTPUT -eq '1' -and -not ($env:FORCE_REBUILD -eq '1') -and $env:STEPA_REUSE_MATCH_FOUND -eq 'true') {
                  if (-not [string]::IsNullOrWhiteSpace($env:STEPA_REUSE_WIN_OUTPUT) -and (Test-Path $env:STEPA_REUSE_WIN_OUTPUT)) {
                    $materializeFrom = Join-Path $env:STEPA_REUSE_WIN_OUTPUT $stepASubdir
                    $materializeTo = Join-Path $outRoot $stepASubdir
                    if (-not (Test-Path $materializeFrom)) {
                      throw "stepa_reuse_source_missing path='$materializeFrom'"
                    }

                    $requiredStepAFiles = @(
                      "stepA_prices_train_${primarySymbol}.csv",
                      "stepA_prices_test_${primarySymbol}.csv",
                      "stepA_periodic_train_${primarySymbol}.csv",
                      "stepA_periodic_test_${primarySymbol}.csv",
                      "stepA_tech_train_${primarySymbol}.csv",
                      "stepA_tech_test_${primarySymbol}.csv",
                      "stepA_split_summary_${primarySymbol}.csv"
                    )

                    $fromNorm = [System.IO.Path]::GetFullPath($materializeFrom).TrimEnd('\')
                    $toNorm = [System.IO.Path]::GetFullPath($materializeTo).TrimEnd('\')
                    if ($fromNorm -eq $toNorm) {
