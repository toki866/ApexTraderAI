              Write-Host "[STEP_STATUS] step=A status=$stepAStatus reason=$stepAReason"
            }
            Add-Content $rp "[STEP_STATUS] step_a_decision_final=$stepAStatus reason=$stepAReason"
          } catch {
            $stepRc = if ($pipelineRc -gt 0) { $pipelineRc } elseif ($LASTEXITCODE -ne $null -and $LASTEXITCODE -ne 0) { $LASTEXITCODE } else { 1 }
            Add-Content $rp "[NG] step_a_entry exception=$_"
            Add-Content $rp "[NG] step_a_decision_final=$stepAStatus reason=$stepAReason"
            Write-Error "StepA entry failed rc=$stepRc error=$_"
          } finally {
            Add-Content $rp "[STEP_STATUS] step_a_entry_result=$stepAStatus rc=$stepRc last_exitcode=$LASTEXITCODE"
            Add-Content $rp "[STEP_STATUS] step_a_entry_outRoot='$outRoot'"
            Add-Content $rp "[STEP_STATUS] step_a_entry_wslOut='$wslOut'"
            Add-Content $rp "[STEP_STATUS] step_a_manifest_path='$manifestPath'"
