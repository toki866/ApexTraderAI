          }
          if (-not ($wslOut -match '^/mnt/')) {
            Add-Content $rp "[NG] step_b invalid_wsl_output='$wslOut'"
            Write-Error "EFFECTIVE_WSL_OUTPUT not a /mnt/ path: '$wslOut'"; exit 1
          }

          $stepARootWin = Join-Path $outRoot ("stepA\\$env:MODE")
          $stepARequired = @(
            ("stepA_prices_train_{0}.csv" -f $sym1),
