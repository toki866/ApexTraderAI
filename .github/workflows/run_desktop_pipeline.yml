          if ($isReuse) { if ($reuseDecision.matched_output_root) { $m=$reuseDecision.matched_output_root; if ($m -match '^/mnt/([a-z])/(.*)$') { $drv=$Matches[1].ToUpperInvariant(); $rest=$Matches[2] -replace '/', '\\'; $mw="${drv}:\\$rest"; "EFFECTIVE_WSL_OUTPUT=$m" | Out-File $env:GITHUB_ENV -Append -Encoding utf8; "EFFECTIVE_WIN_OUTPUT=$mw" | Out-File $env:GITHUB_ENV -Append -Encoding utf8; Add-Content $rp "[REUSE] stepB_reuse_matched_output_root=$mw" } }; $status='skip'; Write-Host "[STEP_STATUS] step=B status=skip reason=reuse matched_output_root=$($reuseDecision.matched_output_root)"; Add-Content $rp "[STEP_STATUS] step=B status=skip reason=reuse matched_output_root=$($reuseDecision.matched_output_root)"; Add-Content $rp "[STEPB_POST] required=stepB/$env:MODE/stepB_pred_time_all_${sym1}.csv exists=$(if (Test-Path $expectedPredWin) { 'pass' } else { 'fail' })"; if (-not (Test-Path $expectedPredWin)) { Add-Content $rp "[STEPB_POST] STEPB_FAIL_REASON=missing_pred_time_all" }; Write-Host "[StepB] status=skip reason=reuse"; exit 0 }
