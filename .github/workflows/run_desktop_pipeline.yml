                  $logLines | Add-Content $rp
                } else {
                  Add-Content $rp '---- step_b_exec_log_tail_last_300 ----'
                  ($logLines | Select-Object -Last 300) | Add-Content $rp
                }
              }
            } else {
              Add-Content $rp '[NG] step_b exec log missing; tail unavailable'
              Add-Content $rp "[NG] step_b exec_log_path=$stepBLogPath"
