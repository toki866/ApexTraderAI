            Write-Host ("[STEPB_PRE] required_stepA={0} exists={1}" -f $p, $(if ($exists) { 'pass' } else { 'fail' }))
            Add-Content $rp ("[STEPB_PRE] required_stepA={0} exists={1}" -f $p, $(if ($exists) { 'pass' } else { 'fail' }))
            if (-not $exists) { $stepAMissing += $p }
