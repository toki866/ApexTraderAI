                    )

                    $fromNorm = [System.IO.Path]::GetFullPath($materializeFrom).TrimEnd('\')
                    $toNorm = [System.IO.Path]::GetFullPath($materializeTo).TrimEnd('\')
                    if ($fromNorm -eq $toNorm) {
                      Add-Content $rp "[STEP_STATUS] stepA_simple_reuse_copy=skipped reason=source_equals_destination path=$fromNorm"
                    } else {
                      New-Item -Path $materializeTo -ItemType Directory -Force | Out-Null
                      foreach ($requiredFile in $requiredStepAFiles) {
                        $src = Join-Path $materializeFrom $requiredFile
                        if (-not (Test-Path $src)) {
                          throw "stepa_reuse_required_artifact_missing file='$src'"
                        }
                        Copy-Item -Path $src -Destination (Join-Path $materializeTo $requiredFile) -Force
                      }
                    }

                    foreach ($requiredFile in $requiredStepAFiles) {
                      $dst = Join-Path $materializeTo $requiredFile
                      if (-not (Test-Path $dst)) {
