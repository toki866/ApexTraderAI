data:
  data_root: data
  output_root: output
  symbols:
    - SOXL

# Cluster regime scaffold (StepDPRIME internal責務分離向け)。
# 現時点で一部は placeholder / not yet wired だが、
# schemaとして定義し将来拡張時の互換を保つ。
cluster_regime:
  enable_cluster_regime: true
  enable_cluster_monthly_refit: true
  enable_cluster_daily_assign: true
  enable_cluster_in_rl_state: true
  cluster_backend: ticc
  cluster_raw_k: 20
  cluster_k_eff_min: 12
  cluster_small_share_threshold: 0.01
  cluster_small_mean_run_threshold: 3
  # 多時間軸連続窓（短期/中期/長期）
  cluster_short_window_days: 20
  cluster_mid_window_weeks: 8
  cluster_long_window_months: 6
  # 8年背景スカラー（軽量文脈）を有効化
  cluster_enable_8y_context: true
  # raw20 rare監視フラグ（small/rare membership）
  cluster_rare_flag_enabled: true

stepDPrime:
  # D'_rl is transformer-only. legacy encoder / PCA compare path was removed.
  encoder_type: transformer
  l_past: 63
  pred_k: 20
  z_past_dim: 32
  z_pred_dim: 32
  z_state_dim: 64
  transformer_d_model: 64
  transformer_nhead: 4
  transformer_num_layers: 2
  transformer_ff_dim: 128
  transformer_dropout: 0.1
  transformer_epochs: 4
  transformer_batch_size: 64
  transformer_lr: 0.001
  transformer_mask_ratio: 0.15
  feature_version: stepdprime_rl_v2
  cluster_source_version: stepA_only_cluster_v1

stepF:
  # Compare entrypoint: run all reward modes by default for StepF comparison.
  # StepF is the router/consume layer; canonical cluster generation remains upstream in D'_cluster.
  stepf_compare_reward_modes: true
  stepf_reward_modes: legacy,profit_basic,profit_regret,profit_light_risk
  # Keep router-side diagnostics opt-in because the audit/baseline/A-B bundle is heavier than the core StepF apply path.
  # Enable this for targeted reruns when you want cluster/usage/fallback diagnostics.
  enable_router_audit: false
  audit_config_path: configs/stepf_audit.yaml
  clusterer_type: ticc_raw20_stable
  raw20_num_clusters: 20
  k_eff_min: 12
  cluster_share_min: 0.01
  cluster_mean_run_min: 3.0
  cluster_main_source: stable
  enable_raw20_monitor: true
  ticc_window_size: 5
  ticc_lambda: 0.11
  ticc_beta: 600.0
  ticc_max_iter: 100
  ticc_threshold: 0.00002
  # Router tuning parameters (PR #353/#357/#358)
  softmax_beta: 5.0
  ema_alpha: 0.3
  shrink_k: 15
  ratio_smooth_alpha: 0.7
  max_agent_mixture_weight: 0.25
  ticc_seed: 42
  # safe_set: agents guaranteed in the allowlist as fallback.
  # dprime_mix_h01 (sharpe=1.16, max_dd=-5.9%) + dprime_mix_3scale (sharpe=1.52) cover both
  # low-risk and high-return profiles. Previously "dprime_all_features_h01" was listed but
  # that profile does not exist in the current agent set and was silently dropped.
  safe_set: "dprime_all_features_h01,dprime_mix_3scale"
  exclude_agents: "dprime_all_features_h03,dprime_bnf_h02"
  # Meta-Router PPO（false=現行の edge_table+EMA、true=PPO Meta-Router に切り替え）
  use_meta_router: true
  meta_router_lookback: 10
  meta_router_timesteps: 200000
  meta_router_n_regimes: 20
  meta_router_lambda_regret: 1.0
  # Cluster-specific expert retraining (B-3)
  enable_cluster_retrain: true
  cluster_retrain_min_rows: 30
  cluster_retrain_steps: 100000


timing:
  enable: true
  clear_on_run_start: true

  live_start_budget:
    buffer_floor_sec: 60
    buffer_ratio: 0.2
